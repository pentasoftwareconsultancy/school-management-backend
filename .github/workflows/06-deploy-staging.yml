name: 06 - Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout staging branch
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: [TEST MODE] Mock Deploy to Render (Staging)
      - name: Deploy to Render Staging (TEST MODE)
        run: |
          echo "🧪 TEST MODE: Skipping real Render deploy"
          echo "✅ Mock deployment to Staging — PASSED"

      # Step 5: Summary
      - name: Summary
        run: |
          echo "✅ Staging deployment triggered"
          echo "🚀 Workflow 07 will now run automatically"
